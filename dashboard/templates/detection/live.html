{% extends 'base.html' %}

{% block content %}
<style>
    /* ===== LIVE DETECTION PAGE SPECIFIC STYLES ===== */
    .ms-live-wrapper {
        max-width: 900px;
        margin: 0 auto;
        animation: msFadeUp 0.6s ease;
    }

    @keyframes msFadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .ms-live-card {
        background: linear-gradient(145deg, var(--ms-glass), rgba(255, 255, 255, 0.01));
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--ms-glass-border);
        border-radius: 24px;
        padding: 2.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .ms-live-header {
        display: flex; align-items: center; gap: 14px;
        margin-bottom: 1.75rem; padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--ms-glass-border);
    }

    .ms-live-icon {
        width: 52px; height: 52px;
        background: linear-gradient(135deg, var(--ms-primary), var(--ms-primary-dark));
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; color: var(--ms-dark-900);
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
        flex-shrink: 0;
    }

    .ms-live-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.5rem; font-weight: 700; color: #fff;
        margin: 0;
    }

    .ms-live-subtitle {
        color: var(--ms-text-muted); font-size: 0.9rem; margin: 4px 0 0;
    }

    /* ===== VIDEO CONTAINER ===== */
    .ms-video-container {
        width: 100%;
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid var(--ms-glass-border);
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        min-height: 480px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        margin-bottom: 1.5rem;
    }

    #webcamFeed, #capturedImage {
        width: 100%;
        height: auto;
        display: block;
    }
    
    #capturedImage {
        display: none;
    }

    /* ===== BUTTONS ===== */
    .ms-controls {
        display: flex;
        gap: 12px;
    }

    .ms-btn-action {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        flex: 1; padding: 14px;
        color: #fff; font-weight: 600; font-size: 1.05rem;
        border: none; border-radius: 12px;
        cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .ms-btn-capture {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .ms-btn-capture:hover {
        background: rgba(255, 255, 255, 0.15);
    }

    .ms-btn-detect {
        background: linear-gradient(135deg, var(--ms-primary), var(--ms-primary-dark));
        color: var(--ms-dark-900);
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
    }
    .ms-btn-detect:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
    }
    
    .ms-btn-detect:disabled {
        opacity: 0.5; cursor: not-allowed; transform: none;
    }

    /* ===== RESULTS SECTION (from upload.html) ===== */
    .ms-results-card {
        background: linear-gradient(145deg, var(--ms-glass), rgba(255, 255, 255, 0.01));
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--ms-glass-border);
        border-radius: 24px;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        margin-top: 2rem;
        display: none; /* hidden initially */
    }

    .ms-results-header {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 1.5rem; padding-bottom: 1rem;
        border-bottom: 1px solid var(--ms-glass-border);
    }

    .ms-results-icon {
        width: 44px; height: 44px;
        background: rgba(16, 185, 129, 0.15);
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; color: var(--ms-accent);
    }

    .ms-results-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.25rem; font-weight: 700; color: #fff; margin: 0;
    }

    .ms-status-badge {
        padding: 16px 20px; border-radius: 16px;
        border: 1px solid; margin-bottom: 1.5rem;
        display: flex; align-items: flex-start; gap: 14px;
    }
    .ms-status-badge.success {
        background: rgba(16, 185, 129, 0.12); border-color: rgba(16, 185, 129, 0.3); color: #6EE7B7;
    }
    .ms-status-badge.danger {
        background: rgba(239, 68, 68, 0.12); border-color: rgba(239, 68, 68, 0.3); color: #FCA5A5;
    }

    .ms-status-icon {
        width: 36px; height: 36px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; flex-shrink: 0;
    }
    .ms-status-badge.success .ms-status-icon { background: rgba(16, 185, 129, 0.2); color: var(--ms-accent); }
    .ms-status-badge.danger .ms-status-icon { background: rgba(239, 68, 68, 0.2); color: var(--ms-danger); }

    .ms-status-content strong {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.1rem; display: block; margin-bottom: 4px;
    }
    .ms-status-content p { margin: 0; font-size: 0.95rem; opacity: 0.9; }

    .ms-metrics-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        margin-bottom: 1.75rem;
    }

    .ms-metric-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--ms-glass-border);
        border-radius: 16px; padding: 18px 20px;
    }

    .ms-metric-label {
        font-size: 0.8rem; color: var(--ms-text-muted);
        text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }

    .ms-metric-value {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.25rem; font-weight: 700;
        display: flex; align-items: center; gap: 8px;
    }
    .ms-metric-value.detected { color: var(--ms-accent); }
    .ms-metric-value.not-detected { color: var(--ms-danger); }
    
    .ms-metric-icon {
        width: 28px; height: 28px; border-radius: 8px;
        display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .ms-metric-value.detected .ms-metric-icon { background: rgba(16, 185, 129, 0.15); color: var(--ms-accent); }
    .ms-metric-value.not-detected .ms-metric-icon { background: rgba(239, 68, 68, 0.15); color: var(--ms-danger); }

    .ms-image-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--ms-glass-border);
        border-radius: 16px; overflow: hidden;
    }
    .ms-image-header {
        padding: 12px 16px; border-bottom: 1px solid var(--ms-glass-border); background: rgba(0, 0, 0, 0.2);
    }
    .ms-image-label {
        font-size: 0.8rem; color: var(--ms-text-muted); font-weight: 500; text-transform: uppercase;
    }
    .ms-image-wrapper {
        padding: 16px; display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.15); min-height: 200px;
    }
    .ms-image-wrapper img {
        max-width: 100%; max-height: 400px; border-radius: 12px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
        .ms-live-card, .ms-results-card { padding: 1.75rem; }
        .ms-live-header { flex-direction: column; text-align: center; }
        .ms-video-container { min-height: 300px; }
        .ms-controls { flex-direction: column; }
    }
</style>

<div class="ms-live-wrapper">
    
    <div class="ms-live-card">
        <div class="ms-live-header">
            <div class="ms-live-icon">
                <i class="fas fa-camera"></i>
            </div>
            <div>
                <h2 class="ms-live-title">Live PPE Detection</h2>
                <p class="ms-live-subtitle">Capture a frame from your webcam to run AI detection</p>
            </div>
        </div>

        <div class="ms-video-container">
            <video id="webcamFeed" autoplay playsinline muted></video>
            <img id="capturedImage" alt="Captured Frame">
            <!-- Hidden canvas to grab frame -->
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div class="ms-controls">
            <button id="btnCapture" class="ms-btn-action ms-btn-capture">
                <i class="fas fa-camera"></i> Capture Frame
            </button>
            <button id="btnDetect" class="ms-btn-action ms-btn-detect" disabled>
                <i class="fas fa-shield-halved"></i> Run Detection
            </button>
            <button id="btnRetake" class="ms-btn-action ms-btn-capture" style="display:none;">
                <i class="fas fa-rotate-left"></i> Retake
            </button>
        </div>
    </div>

    <!-- Results Section -->
    <div class="ms-results-card" id="resultsSection">
        <div class="ms-results-header">
            <div class="ms-results-icon">
                <i class="fas fa-check-double"></i>
            </div>
            <h3 class="ms-results-title">Detection Result</h3>
        </div>

        <div id="statusContainer"></div>

        <div class="ms-metrics-grid">
            <div class="ms-metric-card">
                <div class="ms-metric-label">Helmet</div>
                <div class="ms-metric-value" id="metricHelmet"></div>
            </div>
            <div class="ms-metric-card">
                <div class="ms-metric-label">Safety Vest</div>
                <div class="ms-metric-value" id="metricVest"></div>
            </div>
        </div>

        <div class="ms-image-card">
            <div class="ms-image-header">
                <div class="ms-image-label">AI Annotated Result</div>
            </div>
            <div class="ms-image-wrapper">
                <img id="resultImage" src="" alt="Annotated detection result">
            </div>
        </div>
    </div>

</div>

<script>
    const video = document.getElementById('webcamFeed');
    const canvas = document.getElementById('canvas');
    const capturedImage = document.getElementById('capturedImage');
    
    const btnCapture = document.getElementById('btnCapture');
    const btnDetect = document.getElementById('btnDetect');
    const btnRetake = document.getElementById('btnRetake');
    
    const resultsSection = document.getElementById('resultsSection');
    
    let currentStream = null;
    let base64Image = null;

    // Start Webcam
    async function startWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
            currentStream = stream;
        } catch (err) {
            console.error("Error accessing webcam: ", err);
            alert("Could not access webcam. Please ensure permissions are granted.");
        }
    }

    startWebcam();

    // Capture Frame
    btnCapture.addEventListener('click', () => {
        if (!video.videoWidth) return; // Video not ready
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        base64Image = canvas.toDataURL('image/jpeg');
        capturedImage.src = base64Image;
        
        video.style.display = 'none';
        capturedImage.style.display = 'block';
        
        btnCapture.style.display = 'none';
        btnRetake.style.display = 'flex';
        btnDetect.disabled = false;
    });

    // Retake Frame
    btnRetake.addEventListener('click', () => {
        capturedImage.style.display = 'none';
        video.style.display = 'block';
        
        btnRetake.style.display = 'none';
        btnCapture.style.display = 'flex';
        btnDetect.disabled = true;
        
        resultsSection.style.display = 'none';
    });

    // Run Detection
    btnDetect.addEventListener('click', async () => {
        if (!base64Image) return;
        
        // UI Loading State
        const originalText = btnDetect.innerHTML;
        btnDetect.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        btnDetect.disabled = true;
        btnRetake.disabled = true;

        try {
            const response = await fetch('{% url "detect_frame_api" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ image: base64Image })
            });

            const data = await response.json();
            
            if (response.ok) {
                displayResults(data);
            } else {
                alert("Detection failed: " + (data.error || "Unknown error"));
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Network error occurred while detecting.");
        } finally {
            btnDetect.innerHTML = originalText;
            btnDetect.disabled = false;
            btnRetake.disabled = false;
        }
    });

    function displayResults(data) {
        resultsSection.style.display = 'block';
        
        // Update Status Badge
        const statusContainer = document.getElementById('statusContainer');
        if (data.status === 'ALLOWED FOR MINING') {
            statusContainer.innerHTML = `
                <div class="ms-status-badge success">
                    <div class="ms-status-icon"><i class="fas fa-check"></i></div>
                    <div class="ms-status-content">
                        <strong>${data.status}</strong>
                        <p>Helmet and vest detected. Miner is compliant with safety protocols.</p>
                    </div>
                </div>`;
        } else {
            statusContainer.innerHTML = `
                <div class="ms-status-badge danger">
                    <div class="ms-status-icon"><i class="fas fa-xmark"></i></div>
                    <div class="ms-status-content">
                        <strong>${data.status}</strong>
                        <p>Helmet and vest are required before entering the mining area.</p>
                    </div>
                </div>`;
        }

        // Update Metrics
        const updateMetric = (id, hasItem, iconClass) => {
            const el = document.getElementById(id);
            if (hasItem) {
                el.className = "ms-metric-value detected";
                el.innerHTML = `<span class="ms-metric-icon"><i class="fas ${iconClass}"></i></span> Detected`;
            } else {
                el.className = "ms-metric-value not-detected";
                el.innerHTML = `<span class="ms-metric-icon"><i class="fas ${iconClass}"></i></span> Not Detected`;
            }
        };

        updateMetric('metricHelmet', data.helmet, 'fa-hard-hat');
        updateMetric('metricVest', data.jacket, 'fa-vest');

        // Update Annotated Image
        document.getElementById('resultImage').src = data.result_image_url;
        
        // Scroll to results
        resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
{% endblock %}
