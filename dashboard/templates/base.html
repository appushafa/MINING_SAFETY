<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mining Safety System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Bootstrap (kept for grid/utilities, overridden by custom styles) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --ms-primary: #F59E0B;
            --ms-primary-dark: #D97706;
            --ms-primary-light: #FBBF24;
            --ms-accent: #10B981;
            --ms-dark-900: #0A0A0F;
            --ms-dark-800: #12121A;
            --ms-dark-700: #1A1A2E;
            --ms-glass: rgba(255, 255, 255, 0.04);
            --ms-glass-border: rgba(255, 255, 255, 0.08);
            --ms-text: #E5E7EB;
            --ms-text-muted: #9CA3AF;
            --ms-danger: #EF4444;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ms-dark-900);
            color: var(--ms-text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND EFFECTS ===== */
        .ms-bg-grid {
            position: fixed; inset: 0; z-index: -2;
            background-image: 
                linear-gradient(rgba(245, 158, 11, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245, 158, 11, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            pointer-events: none;
        }

        .ms-bg-glow {
            position: fixed; top: -200px; right: -200px; z-index: -1;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 60%);
            border-radius: 50%; pointer-events: none;
            animation: msPulse 10s ease-in-out infinite alternate;
        }

        @keyframes msPulse {
            0% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        /* ===== NAVBAR ===== */
        .ms-navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 0 2rem; height: 72px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--ms-glass-border);
            transition: all 0.3s ease;
        }

        .ms-navbar.scrolled {
            height: 64px;
            background: rgba(10, 10, 15, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .ms-logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: #fff;
        }

        .ms-logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--ms-primary), var(--ms-primary-dark));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--ms-dark-900); font-weight: 800;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .ms-logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem; font-weight: 700;
        }

        .ms-logo-text span { color: var(--ms-primary); }

        .ms-nav-actions {
            display: flex; align-items: center; gap: 10px;
        }

        .ms-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 12px;
            font-size: 0.9rem; font-weight: 600; text-decoration: none;
            border: 1px solid transparent; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ms-btn-outline {
            background: var(--ms-glass);
            border-color: var(--ms-glass-border);
            color: var(--ms-text);
        }

        .ms-btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
            color: var(--ms-primary);
            transform: translateY(-2px);
        }

        .ms-btn-primary {
            background: linear-gradient(135deg, var(--ms-primary), var(--ms-primary-dark));
            color: var(--ms-dark-900);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.25);
        }

        .ms-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.35);
            background: linear-gradient(135deg, var(--ms-primary-light), var(--ms-primary));
        }

        .ms-btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
        }

        .ms-btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }

        .ms-mobile-toggle {
            display: none; background: none; border: none;
            color: #fff; font-size: 1.25rem; cursor: pointer;
        }

        /* ===== MAIN CONTENT WRAPPER ===== */
        .ms-main {
            padding-top: 100px; padding-bottom: 60px;
            min-height: calc(100vh - 72px);
        }

        /* ===== ALERTS ===== */
        .ms-alert {
            padding: 12px 16px; border-radius: 12px; font-size: 0.9rem;
            margin-bottom: 1.5rem; border: 1px solid;
            display: flex; align-items: center; gap: 10px;
            animation: msFadeIn 0.4s ease;
        }

        @keyframes msFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ms-alert.info { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.25); color: #93C5FD; }
        .ms-alert.success { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.25); color: #6EE7B7; }
        .ms-alert.warning { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.25); color: #FCD34D; }
        .ms-alert.error, .ms-alert.danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.25); color: #FCA5A5; }

        /* ===== FORM OVERRIDES (for Django forms) ===== */
        .ms-form p { margin: 0 0 1.25rem !important; }
        .ms-form label { display: block; color: var(--ms-text-muted); font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
        .ms-form input[type="text"], .ms-form input[type="password"], .ms-form input[type="email"],
        .ms-form input, .ms-form select, .ms-form textarea {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--ms-glass-border); border-radius: 12px;
            color: #fff; font-size: 0.95rem; transition: all 0.3s ease;
        }
        .ms-form input:focus, .ms-form select:focus, .ms-form textarea:focus {
            outline: none; border-color: var(--ms-primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        .ms-form input::placeholder, .ms-form textarea::placeholder { color: rgba(255, 255, 255, 0.3); }
        .ms-form .helptext { font-size: 0.8rem; color: var(--ms-text-muted); margin-top: 6px; display: block; }
        .ms-form .errorlist { color: var(--ms-danger); font-size: 0.85rem; margin: 0.25rem 0 0.75rem; padding-left: 1rem; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .ms-navbar { padding: 0 1rem; }
            .ms-nav-actions {
                position: fixed; top: 72px; left: 0; right: 0;
                background: rgba(10, 10, 15, 0.98);
                backdrop-filter: blur(20px);
                flex-direction: column; align-items: stretch;
                padding: 1rem; gap: 8px;
                border-bottom: 1px solid var(--ms-glass-border);
                transform: translateY(-150%); transition: transform 0.3s ease;
                z-index: 999;
            }
            .ms-nav-actions.active { transform: translateY(0); }
            .ms-mobile-toggle { display: block; }
            .ms-main { padding-top: 140px; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--ms-dark-900); }
        ::-webkit-scrollbar-thumb { background: var(--ms-dark-700); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ms-primary-dark); }
    </style>
</head>

<body>
    <!-- Background Effects -->
    <div class="ms-bg-grid"></div>
    <div class="ms-bg-glow"></div>

    <!-- Navbar -->
    <nav class="ms-navbar" id="msNavbar">
        <a href="/" class="ms-logo">
            <div class="ms-logo-icon"><i class="fas fa-hard-hat"></i></div>
            <div class="ms-logo-text">Safe<span>Mine</span> AI</div>
        </a>

        <button class="ms-mobile-toggle" id="msMobileToggle" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
        </button>

        <div class="ms-nav-actions" id="msNavActions">
            {% block nav_actions %}
                {% if user.is_authenticated %}
                    <a class="ms-btn ms-btn-outline" href="/dashboard/">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                    <a class="ms-btn ms-btn-primary" href="/detection/">
                        <i class="fas fa-search"></i> Detect
                    </a>
                    <form method="post" action="/accounts/logout/" class="m-0">
                        {% csrf_token %}
                        <button class="ms-btn ms-btn-danger" type="submit">
                            <i class="fas fa-right-from-bracket"></i> Logout
                        </button>
                    </form>
                {% else %}
                    <a class="ms-btn ms-btn-outline" href="/accounts/login/">
                        <i class="fas fa-right-to-bracket"></i> Login
                    </a>
                    <a class="ms-btn ms-btn-primary" href="/accounts/signup/">
                        <i class="fas fa-user-plus"></i> Sign Up
                    </a>
                {% endif %}
            {% endblock %}
        </div>
    </nav>

    <!-- Main Content -->
    <main class="ms-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        // ===== NAVBAR SCROLL EFFECT =====
        const navbar = document.getElementById('msNavbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 30) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // ===== MOBILE MENU TOGGLE =====
        const mobileToggle = document.getElementById('msMobileToggle');
        const navActions = document.getElementById('msNavActions');
        
        mobileToggle.addEventListener('click', () => {
            navActions.classList.toggle('active');
            const icon = mobileToggle.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        });

        // Close mobile menu when clicking a link
        navActions.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => {
                navActions.classList.remove('active');
                const icon = mobileToggle.querySelector('i');
                icon.classList.add('fa-bars');
                icon.classList.remove('fa-xmark');
            });
        });

        // ===== AUTO-HIDE ALERTS =====
        document.querySelectorAll('.ms-alert').forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-10px)';
                setTimeout(() => alert.remove(), 300);
            }, 5000);
        });
    </script>
</body>
</html>
