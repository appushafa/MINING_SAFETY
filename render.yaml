services:
  - type: web
    name: mining-safety-project
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn mining_safety_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mining-safety-db
          property: connectionString

databases:
  - name: mining-safety-db
    databaseName: mining_safety
    user: mining_safety_user
    plan: free
